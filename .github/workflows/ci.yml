name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs for the same ref — keeps queues short.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  lint-rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux WebKit + bundler deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        # Treat lints as errors so regressions are caught in PRs. We allow
        # certain pedantic groups by default by not enabling -W; only what
        # rustc/clippy emit at the default level fails the build.
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked --lib

  build:
    name: Build (${{ matrix.platform.name }})
    needs: [lint-frontend, lint-rust]
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux,   os: ubuntu-22.04 }
          - { name: macos,   os: macos-latest }
          - { name: windows, os: windows-latest }

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux WebKit + bundler deps
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Bust the cache when these files change — Cargo.lock alone misses tauri.conf edits.
          key: ${{ matrix.platform.name }}

      - name: Install npm deps
        run: npm ci

      - name: Frontend typecheck + build
        run: npm run build

      - name: Rust check (src-tauri)
        working-directory: src-tauri
        run: cargo check --locked --all-targets
