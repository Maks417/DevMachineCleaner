name: Release

# Triggers:
#   - push a tag like v0.1.0  → builds bundles and attaches them to a draft release
#   - manual dispatch          → same, with a custom tag input
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for the release (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write   # tauri-action needs this to create / update the release

jobs:
  build:
    name: Bundle (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Apple Silicon — produces .dmg + .app.tar.gz for arm64
          - { name: macos-arm64,   os: macos-latest,  rust_target: aarch64-apple-darwin, args: "--target aarch64-apple-darwin" }
          # Intel macs — separate runner since macos-latest is M1
          - { name: macos-x64,     os: macos-13,      rust_target: x86_64-apple-darwin,  args: "--target x86_64-apple-darwin" }
          # AppImage + .deb
          - { name: linux-x64,     os: ubuntu-22.04,  rust_target: x86_64-unknown-linux-gnu, args: "" }
          # MSI + NSIS .exe
          - { name: windows-x64,   os: windows-latest, rust_target: x86_64-pc-windows-msvc,  args: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux WebKit + bundler deps
        if: matrix.platform.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.platform.name }}

      - name: Install npm deps
        run: npm ci

      - name: Resolve release tag
        id: tag
        shell: bash
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build + bundle + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "Developer Machine Cleaner ${{ steps.tag.outputs.tag }}"
          releaseBody: |
            Auto-built bundles for Windows, macOS (Intel + Apple Silicon), and Linux.

            Items are moved to the OS Recycle Bin / Trash and remain recoverable.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}
