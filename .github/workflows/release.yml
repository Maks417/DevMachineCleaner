name: Release

# Triggers:
#   - push a tag like v0.1.0  → builds bundles and attaches them to a draft release
#   - manual dispatch          → same, with a custom tag input
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for the release (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write   # tauri-action needs this to create / update the release

jobs:
  # Sanity-check that the requested tag matches the version baked into
  # package.json, Cargo.toml, and tauri.conf.json before we spend ~30 min
  # on bundles only to attach them to the wrong release.
  verify:
    name: Verify tag matches version metadata
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout requested tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Compare versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.resolve.outputs.tag }}"
          stripped="${tag#v}"
          pkg=$(node -p "require('./package.json').version")
          tauri=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cargo=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          echo "tag=$stripped  package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          for v in "$pkg" "$tauri" "$cargo"; do
            if [ "$v" != "$stripped" ]; then
              echo "::error::Version mismatch: tag $tag expects $stripped but found pkg=$pkg, tauri=$tauri, cargo=$cargo"
              exit 1
            fi
          done

  build:
    name: Bundle (${{ matrix.platform.name }})
    needs: verify
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Apple Silicon — produces .dmg + .app.tar.gz for arm64.
          # Intel macOS dropped: macos-13 (last free Intel runner) was retired
          # in 2026. Intel users can build from source.
          - { name: macos-arm64, os: macos-latest,   rust_target: aarch64-apple-darwin,     args: "--target aarch64-apple-darwin --bundles app,dmg" }
          # AppImage + .deb
          - { name: linux-x64,   os: ubuntu-22.04,   rust_target: x86_64-unknown-linux-gnu, args: "--bundles appimage,deb" }
          # MSI + NSIS .exe
          - { name: windows-x64, os: windows-latest, rust_target: x86_64-pc-windows-msvc,   args: "--bundles msi,nsis" }

    steps:
      - name: Checkout requested tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Install Linux WebKit + bundler deps
        if: matrix.platform.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      # No Swatinem/rust-cache here: releases run once per tag, cache hit-rate is
      # marginal, and removing the action shrinks the codeload flake surface.

      - name: Install npm deps
        run: npm ci

      - name: Build + bundle + attach to release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.verify.outputs.tag }}
          releaseName: "Developer Machine Cleaner ${{ needs.verify.outputs.tag }}"
          releaseBody: |
            Auto-built bundles for Windows, macOS (Apple Silicon), and Linux.

            Intel Mac users: build from source — GitHub retired the free Intel
            macOS runner in 2026, so we no longer ship a prebuilt Intel `.dmg`.

            Items are moved to the OS Recycle Bin / Trash and remain recoverable.

            See [CHANGELOG.md](https://github.com/Maks417/DevMachineCleaner/blob/master/CHANGELOG.md)
            for the list of changes in this release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}

      # Generate SHA-256 sums for the bundles produced by tauri-action and
      # upload them as a separate asset on the draft release. Users can verify
      # downloads with `shasum -a 256 -c <file>` or PowerShell's Get-FileHash.
      - name: Compute checksums
        if: steps.tauri.outputs.artifactPaths != ''
        shell: bash
        run: |
          set -euo pipefail
          paths='${{ steps.tauri.outputs.artifactPaths }}'
          mkdir -p _checksums
          out="_checksums/SHA256SUMS-${{ matrix.platform.name }}.txt"
          : > "$out"
          # tauri-action emits a JSON array of absolute paths.
          node -e "const p = JSON.parse(process.argv[1]); p.forEach(x => console.log(x));" "$paths" | while IFS= read -r f; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              sha=$(node -e "const c=require('crypto');const fs=require('fs');const h=c.createHash('sha256');h.update(fs.readFileSync(process.argv[1]));console.log(h.digest('hex'));" "$f")
              printf '%s  %s\n' "$sha" "$name" >> "$out"
            fi
          done
          echo "checksum_file=$out" >> "$GITHUB_OUTPUT"
        id: checksums

      - name: Upload checksums to release
        if: steps.checksums.outputs.checksum_file != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          draft: true
          files: ${{ steps.checksums.outputs.checksum_file }}
