# Project cleanup rules.
#
# This file is the single source of truth for which developer-project folders
# the scanner detects and which sub-directories it offers to reclaim. Edit it
# to add a new stack or extend the cleanable list for an existing one — no
# Rust changes required (the file is `include_str!`-bundled into the binary
# at build time, so a rebuild is still needed).
#
# Schema:
#   skip_dir_names = [..]      # Names the discovery walker will never descend
#                              # into. Add entries here when introducing a
#                              # cleanable that is large and could otherwise
#                              # be re-scanned recursively.
#
#   [[stacks]]
#   name        = "..."        # Stack label shown in the UI.
#   markers     = ["..."]      # Exact file names that identify the stack.
#   marker_exts = ["..."]      # File-name suffixes (extensions) that identify
#                              # the stack; any one match is enough.
#
#   [[stacks.cleanable]]
#   name     = "node_modules"  # Sub-directory (relative to the project root)
#                              # that can be safely deleted.
#   category = "dependencies"  # One of: "dependencies", "build output", "cache".
#   note     = "..."           # Short explanation surfaced in the UI.
#
# Only paths that the tool itself will recreate on next use belong here.

skip_dir_names = [
    ".git",
    ".hg",
    ".svn",
    "node_modules",
    "target",
    ".venv",
    "venv",
    "__pycache__",
    ".next",
    ".nuxt",
    ".turbo",
    ".cache",
    ".parcel-cache",
    ".svelte-kit",
    ".dart_tool",
    ".gradle",
    "bin",
    "obj",
    "DerivedData",
    "vendor",
    ".terraform",
    ".build",
    "Library",
    "Intermediate",
    "Binaries",
]

[[stacks]]
name = "Node.js"
markers = ["package.json"]
marker_exts = []

[[stacks.cleanable]]
name = "node_modules"
category = "dependencies"
note = "Regenerated when you next install dependencies."

